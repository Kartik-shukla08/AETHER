version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-logging-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_logging
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_logging"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: llm-logging-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: llm-logging-backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/llm_logging?schema=public
      - REDIS_URL=redis://redis:6379
      - PORT=4000
      - HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:4000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  ingestion:
    build:
      context: .
      dockerfile: apps/ingestion/Dockerfile
    container_name: llm-logging-ingestion
    ports:
      - "4010:4010"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/llm_logging?schema=public
      - PORT_INGESTION=4010
      - HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:4010/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: llm-logging-worker
    environment:
      - REDIS_URL=redis://redis:6379
      - INGESTION_URL=http://ingestion:4010/logs
    depends_on:
      redis:
        condition: service_healthy
      ingestion:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: llm-logging-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
      - NEXT_PUBLIC_INGESTION_WS_URL=ws://localhost:4010/ws
    depends_on:
      backend:
        condition: service_healthy
      ingestion:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
